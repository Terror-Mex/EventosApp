<!DOCTYPE html>
<html>
<head>
    <title>Generador de Logo</title>
</head>
<body style="font-family: sans-serif; padding: 40px; text-align: center;">
    <h2>¡Convirtiendo el logo para iPhone!</h2>
    <p>Por favor descarga el archivo dándole clic al botón y guárdalo/muévelo a tu carpeta <b>frontend/public/</b> como <b>apple-touch-icon.png</b></p>
    
    <canvas id="canvas" width="180" height="180" style="border: 1px solid #ccc; margin: 20px auto; display: block;"></canvas>
    
    <a id="downloadBtn" download="apple-touch-icon.png" href="#" style="background: #28364E; color: white; padding: 12px 24px; text-decoration: none; border-radius: 6px; font-weight: bold; display: inline-block;">
        Descargar apple-touch-icon.png
    </a>

    <script>
        const svgContent = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><defs><linearGradient id="ep-gradient" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#28364E" /><stop offset="100%" stop-color="#FACC15" /></linearGradient></defs><rect width="512" height="512" rx="128" fill="url(#ep-gradient)"/><text x="50%" y="55%" font-family="Arial, sans-serif" font-size="280" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">EP</text><path d="M120 400 Q256 340 392 400" fill="none" stroke="#FACC15" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
        
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        const img = new Image();
        const svgBlob = new Blob([svgContent], {type: 'image/svg+xml;charset=utf-8'});
        const url = URL.createObjectURL(svgBlob);
        
        img.onload = () => {
            ctx.drawImage(img, 0, 0, 180, 180);
            const pngUrl = canvas.toDataURL('image/png');
            document.getElementById('downloadBtn').href = pngUrl;
            URL.revokeObjectURL(url);
        };
        img.src = url;
    </script>
</body>
</html>
