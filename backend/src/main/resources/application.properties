
server.port=${SERVER_PORT:8080}

# Database (PostgreSQL por defecto)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/eventpro}
spring.datasource.driverClassName=${DB_DRIVER:org.postgresql.Driver}
spring.datasource.username=${DB_USERNAME:eventpro}
spring.datasource.password=${DB_PASSWORD:eventpro123}
spring.jpa.database-platform=${DB_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}

# Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (solo para dev local con H2)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# File Upload Limits
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:20MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:20MB}

# JWT Configuration
app.jwtSecret=${JWT_SECRET:changeme_this_is_not_secure_at_all_minimum_64_chars}
app.jwtExpirationMs=${JWT_EXPIRATION_MS:86400000}

# Seed Admin
app.admin.email=${ADMIN_EMAIL:admin@eventpro.com}
app.admin.password=${ADMIN_PASSWORD:admin123}
app.admin.nombre=${ADMIN_NOMBRE:Administrador}

#debug
logging.level.org.springdoc=DEBUG

#Cloudinary
CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
